<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GEODRIFT</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05040c; }
  canvas { display: block; }

  #scene-wrap {
    position: fixed; inset: 0;
    transition: filter 0.8s ease;
  }
  #scene-wrap.disoriented {
    filter: hue-rotate(140deg) saturate(1.6) blur(0.6px);
  }

  /* soft vignette */
  #vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(3,2,10,0.75) 100%);
  }

  .hud { font-family: Georgia, 'Times New Roman', serif; color: rgba(220, 228, 255, 0.85); }

  #hud-top {
    position: fixed; top: 26px; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    pointer-events: none; user-select: none;
  }
  #relic-count {
    font-size: 15px; letter-spacing: 0.55em; text-indent: 0.55em;
    font-weight: 400; opacity: 0.9;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }
  #relic-count.pulse { transform: scale(1.35); opacity: 1; }

  #compass {
    width: 34px; height: 34px; position: relative; opacity: 0.75;
  }
  #compass svg { width: 100%; height: 100%; transition: none; }

  #distance {
    font-size: 10px; letter-spacing: 0.4em; text-indent: 0.4em;
    opacity: 0.45; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 300;
  }

  #disorient-label {
    position: fixed; top: 50%; left: 0; right: 0; text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 200;
    font-size: 13px; letter-spacing: 0.9em; text-indent: 0.9em;
    color: rgba(255, 190, 220, 0.9);
    opacity: 0; pointer-events: none; user-select: none;
    transition: opacity 0.5s ease;
    animation: flicker 0.9s infinite;
  }
  #disorient-label.on { opacity: 1; }
  @keyframes flicker { 0%,100% {opacity:inherit;} 50% {opacity:0.35;} }

  #hint {
    position: fixed; bottom: 28px; left: 0; right: 0; text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 300;
    font-size: 10px; letter-spacing: 0.35em; text-indent: 0.35em;
    color: rgba(200, 210, 255, 0.35); pointer-events: none; user-select: none;
    transition: opacity 2s ease;
  }

  /* intro / outro overlays */
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px;
    background: rgba(4, 3, 12, 0.72); backdrop-filter: blur(3px);
    cursor: pointer; z-index: 10;
    transition: opacity 1.6s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h1 {
    font-family: Georgia, serif; font-weight: 400;
    font-size: clamp(34px, 7vw, 64px);
    letter-spacing: 0.5em; text-indent: 0.5em;
    color: rgba(225, 232, 255, 0.95);
    text-shadow: 0 0 40px rgba(130, 160, 255, 0.5);
  }
  .overlay p {
    font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 300;
    font-size: 12px; letter-spacing: 0.4em; text-indent: 0.4em;
    color: rgba(190, 200, 240, 0.55); text-align: center; line-height: 2.2;
    max-width: 80vw;
  }
  .overlay .cta {
    margin-top: 18px; font-size: 11px; letter-spacing: 0.5em; text-indent: 0.5em;
    color: rgba(160, 220, 255, 0.8);
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% {opacity: 0.45;} 50% {opacity: 1;} }

  @media (prefers-reduced-motion: reduce) {
    .overlay .cta, #disorient-label { animation: none; }
  }
</style>
</head>
<body>

<div id="scene-wrap"></div>
<div id="vignette"></div>

<div id="hud-top" class="hud" style="opacity:0; transition: opacity 2s ease;">
  <div id="relic-count">0 / 12</div>
  <div id="compass">
    <svg viewBox="0 0 34 34" id="compass-svg">
      <circle cx="17" cy="17" r="15" fill="none" stroke="rgba(180,195,255,0.18)" stroke-width="1"/>
      <g id="compass-arrow">
        <path d="M17 5 L21 17 L17 14.5 L13 17 Z" fill="rgba(160,220,255,0.9)"/>
      </g>
    </svg>
  </div>
  <div id="distance"></div>
</div>

<div id="disorient-label" class="hud">D I S O R I E N T E D</div>
<div id="hint">move mouse to steer &nbsp;·&nbsp; hold W or ↑ to drift &nbsp;·&nbsp; avoid the wave</div>

<div class="overlay" id="intro">
  <h1>GEODRIFT</h1>
  <p>an endless quiet<br/>twelve relics adrift in the dark<br/>the wave will try to turn you around</p>
  <div class="cta">CLICK TO BEGIN DRIFTING</div>
</div>

<div class="overlay hidden" id="outro">
  <h1>STILLNESS</h1>
  <p>all twelve relics gathered<br/>the drift is yours now</p>
  <div class="cta">CLICK TO DRIFT AGAIN</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.163.0/three.module.min.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   GEODRIFT — an ethereal free-floating relic hunt
   All visuals procedural. All music generated by Web Audio.
   ============================================================ */

// ---------- Scene basics ----------
const wrap = document.getElementById('scene-wrap');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05040c, 0.0035);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x05040c);
wrap.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x334066, 1.2));
const keyLight = new THREE.PointLight(0x88aaff, 1.4, 400);
scene.add(keyLight);

// ---------- Helper: soft radial glow texture ----------
function glowTexture(inner, outer) {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(64,64,0, 64,64,64);
  grad.addColorStop(0, inner);
  grad.addColorStop(0.4, outer);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const softWhite = glowTexture('rgba(255,255,255,0.9)', 'rgba(150,180,255,0.25)');

// ---------- Starfield (far, static) ----------
{
  const N = 3500, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  const c1 = new THREE.Color(0x9db4ff), c2 = new THREE.Color(0xffd9ec), c3 = new THREE.Color(0xaffbf1);
  for (let i=0;i<N;i++){
    const v = new THREE.Vector3().randomDirection().multiplyScalar(600 + Math.random()*900);
    pos.set([v.x,v.y,v.z], i*3);
    const c = [c1,c2,c3][Math.floor(Math.random()*3)].clone().multiplyScalar(0.4+Math.random()*0.6);
    col.set([c.r,c.g,c.b], i*3);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  const stars = new THREE.Points(geo, new THREE.PointsMaterial({
    size: 2.2, map: softWhite, vertexColors: true, transparent: true,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true
  }));
  stars.frustumCulled = false;
  scene.add(stars);
}

// ---------- Distant nebulae (large soft sprites) ----------
const nebulaHues = ['rgba(120,90,255,0.35)','rgba(60,200,220,0.3)','rgba(255,110,190,0.25)','rgba(90,140,255,0.3)'];
for (let i=0;i<9;i++){
  const tex = glowTexture(nebulaHues[i % nebulaHues.length], 'rgba(20,10,60,0.12)');
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity: 0.5, depthWrite: false, blending: THREE.AdditiveBlending
  }));
  sp.position.copy(new THREE.Vector3().randomDirection().multiplyScalar(500 + Math.random()*600));
  const s = 300 + Math.random()*500;
  sp.scale.set(s, s, 1);
  scene.add(sp);
}

// ---------- Local drifting dust (gives sense of motion) ----------
const DUST_N = 700, DUST_R = 90;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(DUST_N*3);
for (let i=0;i<DUST_N;i++){
  dustPos[i*3]   = (Math.random()-0.5)*2*DUST_R;
  dustPos[i*3+1] = (Math.random()-0.5)*2*DUST_R;
  dustPos[i*3+2] = (Math.random()-0.5)*2*DUST_R;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos,3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  size: 0.9, color: 0x7f9bff, map: softWhite, transparent: true, opacity: 0.55,
  depthWrite: false, blending: THREE.AdditiveBlending
}));
dust.frustumCulled = false;
scene.add(dust);

// ---------- Relics ----------
const RELIC_COUNT = 12;
const relicPalette = [0x7ef0ff, 0xb08cff, 0xff9ed2, 0x8affc1, 0xffe08a, 0x8ab6ff];
const relics = [];

function makeRelic(pos, hue) {
  const group = new THREE.Group();
  group.position.copy(pos);

  const core = new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.6, 0),
    new THREE.MeshStandardMaterial({
      color: hue, emissive: hue, emissiveIntensity: 0.9,
      roughness: 0.3, metalness: 0.2, flatShading: true
    })
  );
  group.add(core);

  const shell = new THREE.Mesh(
    new THREE.IcosahedronGeometry(2.6, 1),
    new THREE.MeshBasicMaterial({ color: hue, wireframe: true, transparent: true, opacity: 0.22 })
  );
  group.add(shell);

  const cssHue = '#' + hue.toString(16).padStart(6,'0');
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTexture(cssHue + 'e6', cssHue + '30'),
    transparent: true, opacity: 0.9, depthWrite: false, blending: THREE.AdditiveBlending
  }));
  glow.scale.set(14,14,1);
  group.add(glow);

  scene.add(group);
  return { group, core, shell, glow, hue, collected: false,
           spin: 0.3 + Math.random()*0.5, phase: Math.random()*Math.PI*2 };
}

for (let i=0;i<RELIC_COUNT;i++){
  // Ring them around the start point at increasing distances, random directions
  const dir = new THREE.Vector3().randomDirection();
  const dist = 45 + i * 14 + Math.random()*18;
  relics.push(makeRelic(dir.multiplyScalar(dist), relicPalette[i % relicPalette.length]));
}

// ---------- Collection burst particles ----------
const bursts = [];
function spawnBurst(pos, hue) {
  const N = 60, geo = new THREE.BufferGeometry();
  const p = new Float32Array(N*3), v = [];
  for (let i=0;i<N;i++){
    p.set([pos.x, pos.y, pos.z], i*3);
    v.push(new THREE.Vector3().randomDirection().multiplyScalar(6 + Math.random()*10));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(p,3));
  const mat = new THREE.PointsMaterial({
    size: 1.6, color: hue, map: softWhite, transparent: true, opacity: 1,
    depthWrite: false, blending: THREE.AdditiveBlending
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  bursts.push({ pts, vels: v, life: 1 });
}

// ---------- Shockwave ----------
const waveMat = new THREE.MeshBasicMaterial({
  color: 0xff7fb8, transparent: true, opacity: 0, side: THREE.BackSide,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const waveMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 24), waveMat);
waveMesh.visible = false;
scene.add(waveMesh);

const wave = { active: false, center: new THREE.Vector3(), radius: 0, speed: 26, maxR: 230, hitDone: false, nextAt: 14 };

function launchWave() {
  wave.active = true; wave.hitDone = false;
  wave.radius = 1;
  // spawn somewhere loosely around the player
  wave.center.copy(camera.position).add(new THREE.Vector3().randomDirection().multiplyScalar(50 + Math.random()*80));
  waveMesh.position.copy(wave.center);
  waveMesh.visible = true;
  audio.waveSwell();
}

// ---------- Disorientation state ----------
const disorient = { active: false, t: 0, duration: 6 };
const sceneWrapEl = document.getElementById('scene-wrap');
const disLabel = document.getElementById('disorient-label');

function triggerDisorient() {
  disorient.active = true; disorient.t = disorient.duration;
  sceneWrapEl.classList.add('disoriented');
  disLabel.classList.add('on');
  audio.disorientHit();
}

// ---------- Player / controls ----------
const player = {
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0, roll: 0,
  thrust: false, brake: false
};
const mouse = { x: 0, y: 0 };          // -1..1 from screen centre → turn rate
const ACCEL = 22, DAMP = 0.985, MAXV = 34;

addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth - 0.5) * 2;
  mouse.y = (e.clientY / innerHeight - 0.5) * 2;
});
addEventListener('keydown', e => {
  if (['KeyW','ArrowUp'].includes(e.code)) player.thrust = true;
  if (['KeyS','ArrowDown'].includes(e.code)) player.brake = true;
});
addEventListener('keyup', e => {
  if (['KeyW','ArrowUp'].includes(e.code)) player.thrust = false;
  if (['KeyS','ArrowDown'].includes(e.code)) player.brake = false;
});
// Touch: drag steers, holding a finger thrusts
let touchActive = false;
addEventListener('touchstart', e => { touchActive = true; player.thrust = true; }, {passive:true});
addEventListener('touchend', () => { touchActive = false; player.thrust = false; mouse.x = mouse.y = 0; });
addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.x = (t.clientX / innerWidth - 0.5) * 2;
  mouse.y = (t.clientY / innerHeight - 0.5) * 2;
}, {passive:true});

// ---------- HUD ----------
const hudTop = document.getElementById('hud-top');
const countEl = document.getElementById('relic-count');
const distEl = document.getElementById('distance');
const arrowEl = document.getElementById('compass-arrow');
let collectedCount = 0;

function updateHUD() {
  let nearest = null, best = Infinity;
  for (const r of relics) {
    if (r.collected) continue;
    const d = r.group.position.distanceTo(camera.position);
    if (d < best) { best = d; nearest = r; }
  }
  if (!nearest) { distEl.textContent = ''; return; }
  // Direction to relic in camera-local space → yaw angle for the compass
  const local = nearest.group.position.clone().sub(camera.position)
                  .applyQuaternion(camera.quaternion.clone().invert());
  const ang = Math.atan2(local.x, -local.z);
  arrowEl.setAttribute('transform', `rotate(${ang * 180/Math.PI} 17 17)`);
  distEl.textContent = Math.round(best) + ' AWAY';
}

// ============================================================
//  GENERATIVE AUDIO — slow pad, chimes, wave swell
// ============================================================
const audio = (() => {
  let ctx, master, delay, delayGain, padGain, padOscs = [], padFilter;
  let chordTimer = null, started = false;

  const midi = m => 440 * Math.pow(2, (m - 69) / 12);
  // Dreamy lydian-ish chord set (MIDI notes)
  const chords = [
    [48, 55, 62, 64],   // C  G  D  E
    [45, 52, 59, 62],   // A  E  B  D
    [41, 48, 55, 57],   // F  C  G  A
    [43, 50, 57, 59],   // G  D  A  B
  ];
  const chimeScale = [72, 74, 76, 79, 81, 84, 86, 88, 91, 93, 96, 98]; // C maj pentatonic climb

  function start() {
    if (started) return; started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    master = ctx.createGain(); master.gain.value = 0.0;
    const comp = ctx.createDynamicsCompressor();
    master.connect(comp); comp.connect(ctx.destination);

    // Space delay
    delay = ctx.createDelay(2); delay.delayTime.value = 0.46;
    delayGain = ctx.createGain(); delayGain.gain.value = 0.34;
    delay.connect(delayGain); delayGain.connect(delay);
    delayGain.connect(master);

    // Pad: detuned oscillators through a slowly breathing lowpass
    padGain = ctx.createGain(); padGain.gain.value = 0.05;
    padFilter = ctx.createBiquadFilter(); padFilter.type = 'lowpass';
    padFilter.frequency.value = 700; padFilter.Q.value = 0.6;
    padGain.connect(padFilter); padFilter.connect(master); padFilter.connect(delay);

    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.05;
    const lfoGain = ctx.createGain(); lfoGain.gain.value = 320;
    lfo.connect(lfoGain); lfoGain.connect(padFilter.frequency); lfo.start();

    for (let i=0;i<4;i++){
      const o = ctx.createOscillator(); o.type = i % 2 ? 'triangle' : 'sine';
      const g = ctx.createGain(); g.gain.value = 0.25;
      o.detune.value = (Math.random()-0.5) * 10;
      o.connect(g); g.connect(padGain);
      o.start();
      padOscs.push({ o, g });
    }

    setChord(0);
    let idx = 0;
    chordTimer = setInterval(() => { idx = (idx+1) % chords.length; setChord(idx); }, 11000);

    // Gentle fade in
    master.gain.linearRampToValueAtTime(0.8, ctx.currentTime + 4);
  }

  function setChord(i) {
    const now = ctx.currentTime;
    chords[i].forEach((m, k) => {
      const osc = padOscs[k];
      if (osc) osc.o.frequency.exponentialRampToValueAtTime(midi(m), now + 5); // slow glide
    });
  }

  function chime(step) {
    if (!started) return;
    const now = ctx.currentTime;
    const f = midi(chimeScale[Math.min(step, chimeScale.length-1)]);
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 2.01; // shimmer partial
    const g = ctx.createGain(); g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.35, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);
    const g2 = ctx.createGain(); g2.gain.value = 0.08;
    o.connect(g); o2.connect(g2); g2.connect(g);
    g.connect(master); g.connect(delay);
    o.start(now); o2.start(now); o.stop(now + 3); o2.stop(now + 3);
  }

  function noiseBuffer() {
    const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const d = b.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    return b;
  }

  function waveSwell() {
    if (!started) return;
    const now = ctx.currentTime;
    // deep sub swell
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = 42;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.4, now + 2.5);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 7);
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + 7.2);
    // airy whoosh
    const n = ctx.createBufferSource(); n.buffer = noiseBuffer(); n.loop = true;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 500; f.Q.value = 1.2;
    const ng = ctx.createGain(); ng.gain.setValueAtTime(0.0001, now);
    ng.gain.exponentialRampToValueAtTime(0.12, now + 2.5);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + 7);
    f.frequency.linearRampToValueAtTime(1600, now + 6);
    n.connect(f); f.connect(ng); ng.connect(master);
    n.start(now); n.stop(now + 7.2);
  }

  function disorientHit() {
    if (!started) return;
    const now = ctx.currentTime;
    const o = ctx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(300, now);
    o.frequency.exponentialRampToValueAtTime(60, now + 1.4);
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 900;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.18, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
    o.connect(f); f.connect(g); g.connect(master); g.connect(delay);
    o.start(now); o.stop(now + 1.7);
  }

  function finale() {
    if (!started) return;
    // resolve: slow rising arpeggio of the whole scale
    chimeScale.forEach((m, i) => setTimeout(() => chime(i), i * 260));
  }

  return { start, chime, waveSwell, disorientHit, finale };
})();

// ============================================================
//  GAME FLOW
// ============================================================
const intro = document.getElementById('intro');
const outro = document.getElementById('outro');
const hint = document.getElementById('hint');
let playing = false, won = false;

intro.addEventListener('click', () => {
  audio.start();
  intro.classList.add('hidden');
  hudTop.style.opacity = 1;
  playing = true;
  setTimeout(() => hint.style.opacity = 0, 9000);
});
outro.addEventListener('click', () => location.reload());

function collect(r) {
  r.collected = true;
  scene.remove(r.group);
  spawnBurst(r.group.position, r.hue);
  audio.chime(collectedCount);
  collectedCount++;
  countEl.textContent = `${collectedCount} / ${RELIC_COUNT}`;
  countEl.classList.add('pulse');
  setTimeout(() => countEl.classList.remove('pulse'), 450);

  if (collectedCount === RELIC_COUNT) {
    won = true;
    audio.finale();
    setTimeout(() => outro.classList.remove('hidden'), 2500);
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
const clock = new THREE.Clock();
const fwd = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if (playing && !won) {
    // --- Steering: mouse offset from centre = turn rate; inverted when disoriented ---
    const inv = disorient.active ? -1 : 1;
    const dead = 0.06; // small deadzone in the middle
    const mx = Math.abs(mouse.x) > dead ? mouse.x : 0;
    const my = Math.abs(mouse.y) > dead ? mouse.y : 0;
    player.yaw   -= mx * inv * 1.1 * dt;
    player.pitch -= my * inv * 0.9 * dt;
    player.pitch = Math.max(-1.35, Math.min(1.35, player.pitch));

    // banked roll for feel + wobble while disoriented
    let targetRoll = -mx * inv * 0.35;
    if (disorient.active) targetRoll += Math.sin(t * 5) * 0.25;
    player.roll += (targetRoll - player.roll) * 3 * dt;

    camera.quaternion.setFromEuler(new THREE.Euler(player.pitch, player.yaw, player.roll, 'YXZ'));

    // --- Thrust / drift physics ---
    camera.getWorldDirection(fwd);
    if (player.thrust) player.vel.addScaledVector(fwd, ACCEL * dt);
    if (player.brake)  player.vel.multiplyScalar(1 - 2.2 * dt);
    player.vel.multiplyScalar(DAMP);
    if (player.vel.length() > MAXV) player.vel.setLength(MAXV);
    camera.position.addScaledVector(player.vel, dt);

    keyLight.position.copy(camera.position);

    // --- Wrap dust around the player so space never runs out of motion cues ---
    const p = dustGeo.attributes.position.array;
    for (let i=0;i<DUST_N;i++){
      for (let a=0;a<3;a++){
        const idx = i*3+a;
        const camA = a===0?camera.position.x : a===1?camera.position.y : camera.position.z;
        let rel = p[idx] - camA;
        if (rel >  DUST_R) p[idx] -= DUST_R*2;
        if (rel < -DUST_R) p[idx] += DUST_R*2;
      }
    }
    dustGeo.attributes.position.needsUpdate = true;

    // --- Relics: idle animation + pickup ---
    for (const r of relics) {
      if (r.collected) continue;
      r.core.rotation.y += r.spin * dt;
      r.core.rotation.x += r.spin * 0.6 * dt;
      r.shell.rotation.y -= r.spin * 0.4 * dt;
      const pulse = 1 + Math.sin(t * 1.4 + r.phase) * 0.12;
      r.glow.scale.set(14*pulse, 14*pulse, 1);
      r.group.position.y += Math.sin(t * 0.5 + r.phase) * 0.004; // gentle bob
      if (r.group.position.distanceTo(camera.position) < 5.5) collect(r);
    }

    // --- Shockwave lifecycle ---
    wave.nextAt -= dt;
    if (!wave.active && wave.nextAt <= 0) launchWave();
    if (wave.active) {
      wave.radius += wave.speed * dt;
      waveMesh.scale.setScalar(wave.radius);
      const lifeFrac = wave.radius / wave.maxR;
      waveMat.opacity = 0.18 * (1 - lifeFrac) + 0.04;
      // Hit check: the player crosses the expanding shell
      const d = camera.position.distanceTo(wave.center);
      if (!wave.hitDone && Math.abs(d - wave.radius) < 3.5) {
        wave.hitDone = true;
        triggerDisorient();
      }
      if (wave.radius > wave.maxR) {
        wave.active = false; waveMesh.visible = false;
        wave.nextAt = 16 + Math.random() * 12;
      }
    }

    // --- Disorientation timer ---
    if (disorient.active) {
      disorient.t -= dt;
      if (disorient.t <= 0) {
        disorient.active = false;
        sceneWrapEl.classList.remove('disoriented');
        disLabel.classList.remove('on');
      }
    }

    updateHUD();
  }

  // --- Collection bursts fade out ---
  for (let i=bursts.length-1;i>=0;i--){
    const b = bursts[i]; b.life -= dt * 0.7;
    const arr = b.pts.geometry.attributes.position.array;
    for (let k=0;k<b.vels.length;k++){
      arr[k*3]   += b.vels[k].x * dt;
      arr[k*3+1] += b.vels[k].y * dt;
      arr[k*3+2] += b.vels[k].z * dt;
    }
    b.pts.geometry.attributes.position.needsUpdate = true;
    b.pts.material.opacity = Math.max(0, b.life);
    if (b.life <= 0) { scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose(); bursts.splice(i,1); }
  }

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
