<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEODRIFT // Ultra Aesthetic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #010104;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            color: rgba(255, 255, 255, 0.85);
            user-select: none;
        }
        canvas { display: block; }
        
        /* Glassmorphism UI */
        #hud {
            position: absolute;
            top: 15px; left: 15px; right: 15px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: rgba(10, 10, 20, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 5;
        }
        .hud-section { display: flex; align-items: center; gap: 24px; }
        .title { color: #fff; font-weight: 700; font-size: 16px; letter-spacing: 0.3em; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .controls-hint { color: #555566; font-size: 11px; }
        .stat-group { display: flex; align-items: center; gap: 8px; }
        .stat-label { color: #666688; font-size: 10px; }
        .stat-value { color: #fff; font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums; }
        
        .relic-counters { display: flex; gap: 15px; align-items: center; padding-left: 10px; border-left: 1px solid rgba(255,255,255,0.1); }
        .relic-dot {
            display: inline-block; width: 8px; height: 8px; transform: rotate(45deg);
            box-shadow: 0 0 8px currentColor;
        }
        
        /* Cinematic Start Screen */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #050510 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 1.5s ease, backdrop-filter 1.5s ease;
            backdrop-filter: blur(20px);
        }
        .btn-init {
            background: rgba(79, 111, 255, 0.05);
            color: #7fa4ff;
            border: 1px solid rgba(127, 164, 255, 0.4);
            border-radius: 4px;
            padding: 16px 48px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px; font-weight: 600; letter-spacing: 0.4em; text-transform: uppercase;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 50px;
            position: relative; overflow: hidden;
        }
        .btn-init:hover {
            background: rgba(79, 111, 255, 0.2);
            color: #fff;
            box-shadow: 0 0 40px rgba(127, 164, 255, 0.3);
            border-color: #fff;
        }
        
        #disorient-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, rgba(255, 0, 70, 0) 100%);
            transition: background 0.5s ease; z-index: 2;
        }
        .disoriented #disorient-overlay {
            background: radial-gradient(circle at center, transparent 30%, rgba(255, 0, 70, 0.15) 100%);
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-section">
            <span class="title">GEODRIFT</span>
            <span class="controls-hint">WAD - DRIFT  <span style="opacity:0.3">|</span>  SHIFT - SURGE</span>
        </div>
        <div class="hud-section">
            <div id="status-text" class="stat-label" style="color: #00ffaa;">SYSTEM ALIGNED</div>
            <div class="stat-group">
                <span class="stat-label">GATHERED</span>
                <span id="score" class="stat-value">0 / 15</span>
            </div>
            <div class="stat-group">
                <span class="stat-label">DRIFT</span>
                <span id="drift-dist" class="stat-value">0</span> <span class="stat-label">LY</span>
            </div>
            <div class="relic-counters">
                <div class="stat-group"><span class="relic-dot" style="color: #00ffff; background: #00ffff;"></span> <span id="r-cyan" class="stat-value">0</span></div>
                <div class="stat-group"><span class="relic-dot" style="color: #a876ff; background: #a876ff;"></span> <span id="r-purple" class="stat-value">0</span></div>
                <div class="stat-group"><span class="relic-dot" style="color: #ffdb58; background: #ffdb58;"></span> <span id="r-gold" class="stat-value">0</span></div>
            </div>
        </div>
    </div>

    <div id="disorient-overlay"></div>

    <div id="start-screen">
        <div style="font-size: 24px; font-weight: 700; letter-spacing: 0.8em; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); margin-bottom: 20px;">GEODRIFT</div>
        <div style="font-size: 13px; letter-spacing: 0.2em; color: #778; max-width: 400px; text-align: center; line-height: 2;">
            A procedurally generated audiovisual experience.<br>
            Headphones highly recommended.
        </div>
        <button class="btn-init" id="start-btn">INITIALIZE VEIL</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('start-btn');

// HUD Elements
const scoreEl = document.getElementById('score');
const driftEl = document.getElementById('drift-dist');
const rCyanEl = document.getElementById('r-cyan');
const rPurpleEl = document.getElementById('r-purple');
const rGoldEl = document.getElementById('r-gold');
const statusEl = document.getElementById('status-text');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- AUDIO ENGINE ---
let audioCtx;
const scale = [146.83, 164.81, 196.00, 220.00, 246.94, 293.66, 329.63, 392.00, 440.00, 587.33];
let currentStep = 0;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const droneOsc = audioCtx.createOscillator();
    const droneGain = audioCtx.createGain();
    droneOsc.type = 'sine'; droneOsc.frequency.value = 73.42;
    droneGain.gain.value = 0.05;
    droneOsc.connect(droneGain); droneGain.connect(audioCtx.destination);
    droneOsc.start();

    setInterval(() => {
        if (Math.random() > 0.3) {
            const noteIndex = (currentStep + Math.floor(Math.random() * 3)) % scale.length;
            playPad(scale[noteIndex], 3.0, 0.04);
        }
        currentStep++;
    }, 500);
}

function playPad(freq, duration, volume) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const filter = audioCtx.createBiquadFilter();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'sine'; osc.frequency.value = freq;
    filter.type = 'lowpass'; filter.frequency.value = 1000;
    
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.8);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    
    osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

function playChime(type) {
    let base = 440;
    if (type === 'purple') base = 587.33;
    if (type === 'gold') base = 659.25;
    playPad(base, 2.5, 0.1);
    setTimeout(() => playPad(base * 1.5, 2.0, 0.05), 100);
}

// --- GAME LOGIC ---
const keys = { w: false, a: false, d: false, Shift: false };
window.addEventListener('keydown', e => { if(['w','a','d','Shift','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) handleKey(e, true); });
window.addEventListener('keyup', e => { if(['w','a','d','Shift','ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) handleKey(e, false); });

function handleKey(e, isDown) {
    const k = e.key === 'ArrowUp' ? 'w' : e.key === 'ArrowLeft' ? 'a' : e.key === 'ArrowRight' ? 'd' : e.key;
    keys[k] = isDown;
}

const player = {
    x: 4000, y: 4000, vx: 0, vy: 0,
    rotation: -Math.PI / 2,
    baseThrust: 0.12, surgeThrust: 0.28,
    maxSpeed: 7, turnSpeed: 0.05,
    trail: [], disoriented: false, disorientTime: 0
};

let stars = []; let relics = []; let shockwaves = []; let dust = [];
let totalGathered = 0; const counts = { cyan: 0, purple: 0, gold: 0 };
let camera = { x: 4000, y: 4000 };

const relicTypes = [
    { id: 'cyan', color: '#00ffff', core: '#e6ffff' },
    { id: 'purple', color: '#a876ff', core: '#ead9ff' },
    { id: 'gold', color: '#ffdb58', core: '#fff6d6' }
];

function generateEnvironment() {
    // Stars
    for(let i=0; i<800; i++) {
        stars.push({
            x: Math.random() * 10000, y: Math.random() * 10000,
            size: Math.random() * 1.5, opacity: Math.random() * 0.5 + 0.1,
            parallax: Math.random() * 0.4 + 0.1
        });
    }
    // Deep Nebulas (Organic coloring)
    for(let i=0; i<20; i++) {
        stars.push({
            x: Math.random() * 10000, y: Math.random() * 10000,
            size: Math.random() * 150 + 50, opacity: 0.06, parallax: 0.05,
            isNebula: true, color: ['#120c24', '#0d1a24', '#1f0d16'][Math.floor(Math.random()*3)]
        });
    }
    // Cosmic Dust (Foreground moving particles)
    for(let i=0; i<100; i++) {
        dust.push({
            x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
            size: Math.random() * 2 + 1
        });
    }
}

function spawnRelic() {
    const type = relicTypes[Math.floor(Math.random() * relicTypes.length)];
    relics.push({
        x: player.x + (Math.random() - 0.5) * 3000, y: player.y + (Math.random() - 0.5) * 3000,
        size: Math.random() * 4 + 6, type: type,
        rotA: Math.random() * Math.PI, rotB: Math.random() * Math.PI
    });
}

function spawnShockwave() {
    shockwaves.push({
        x: player.x + (Math.random() - 0.5) * 1500, y: player.y + (Math.random() - 0.5) * 1500,
        radius: 10, maxRadius: 1200, speed: 4.5
    });
}

generateEnvironment();
for(let i=0; i<40; i++) spawnRelic();

// --- TICK ---
function update() {
    const thrust = keys.Shift ? player.surgeThrust : player.baseThrust;
    const turn = player.disoriented ? -player.turnSpeed : player.turnSpeed;

    if (keys.a) player.rotation -= turn;
    if (keys.d) player.rotation += turn;
    if (keys.w) {
        player.vx += Math.cos(player.rotation) * thrust;
        player.vy += Math.sin(player.rotation) * thrust;
    }

    const speed = Math.hypot(player.vx, player.vy);
    const cap = keys.Shift ? player.maxSpeed * 1.5 : player.maxSpeed;
    if (speed > cap) {
        player.vx = (player.vx / speed) * cap;
        player.vy = (player.vy / speed) * cap;
    }

    player.x += player.vx; player.y += player.vy;
    
    // Smooth Camera
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.08;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.08;

    driftEl.innerText = Math.floor(Math.hypot(player.x - 4000, player.y - 4000) * 0.01);

    // Smooth Trail Ribbon Recording
    player.trail.unshift({ x: player.x, y: player.y });
    if (player.trail.length > 50) player.trail.pop();

    // Relics
    relics.forEach((r, i) => {
        r.rotA += 0.03; r.rotB -= 0.015;
        if (Math.hypot(player.x - r.x, player.y - r.y) < 30) {
            counts[r.type.id]++; totalGathered++;
            scoreEl.innerText = `${totalGathered} / 15`;
            document.getElementById(`r-${r.type.id}`).innerText = counts[r.type.id];
            playChime(r.type.id);
            relics.splice(i, 1); spawnRelic();
        }
    });

    // Shockwaves
    if (Math.random() < 0.002) spawnShockwave();
    shockwaves.forEach((w, i) => {
        w.radius += w.speed;
        if (Math.abs(Math.hypot(player.x - w.x, player.y - w.y) - w.radius) < 20 && !player.disoriented) {
            player.disoriented = true; player.disorientTime = 300;
            document.body.classList.add('disoriented');
            statusEl.innerText = "CRITICAL DISPLACEMENT"; statusEl.style.color = "#ff0044";
            playPad(90, 4.0, 0.15);
        }
        if (w.radius > w.maxRadius) shockwaves.splice(i, 1);
    });

    if (player.disoriented && --player.disorientTime <= 0) {
        player.disoriented = false;
        document.body.classList.remove('disoriented');
        statusEl.innerText = "SYSTEM ALIGNED"; statusEl.style.color = "#00ffaa";
    }

    // Foreground Dust Animation
    dust.forEach(d => {
        d.x += d.vx - player.vx * 0.1; d.y += d.vy - player.vy * 0.1;
        if (d.x < 0) d.x = canvas.width; else if (d.x > canvas.width) d.x = 0;
        if (d.y < 0) d.y = canvas.height; else if (d.y > canvas.height) d.y = 0;
    });
}

// --- RENDER ---
function draw() {
    ctx.fillStyle = "#010104";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);
    if (player.disoriented) ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);

    // 1. Render Background
    ctx.globalCompositeOperation = 'source-over';
    stars.forEach(s => {
        let sx = (s.x - camera.x * s.parallax) % 10000; let sy = (s.y - camera.y * s.parallax) % 10000;
        if (sx < 0) sx += 10000; if (sy < 0) sy += 10000;
        
        if (s.isNebula) {
            ctx.globalCompositeOperation = 'lighter';
            let grad = ctx.createRadialGradient(sx+camera.x, sy+camera.y, 0, sx+camera.x, sy+camera.y, s.size);
            grad.addColorStop(0, s.color); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(sx+camera.x, sy+camera.y, s.size, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
        } else {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.fillRect(sx+camera.x, sy+camera.y, s.size, s.size);
        }
    });

    ctx.globalCompositeOperation = 'lighter';

    // 2. Multi-faceted Relics
    relics.forEach(r => {
        ctx.save(); ctx.translate(r.x, r.y);
        ctx.shadowBlur = 20; ctx.shadowColor = r.type.color;
        
        // Inner core
        ctx.rotate(r.rotA);
        ctx.fillStyle = r.type.core;
        ctx.beginPath();
        ctx.moveTo(0, -r.size*0.6); ctx.lineTo(r.size*0.6, 0); ctx.lineTo(0, r.size*0.6); ctx.lineTo(-r.size*0.6, 0);
        ctx.fill();

        // Outer wireframe
        ctx.rotate(r.rotB - r.rotA);
        ctx.strokeStyle = r.type.color; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -r.size); ctx.lineTo(r.size, 0); ctx.lineTo(0, r.size); ctx.lineTo(-r.size, 0);
        ctx.closePath(); ctx.stroke();
        ctx.restore();
    });

    // 3. Chromatic Shockwaves
    shockwaves.forEach(w => {
        const alpha = 1 - (w.radius / w.maxRadius);
        ctx.lineWidth = 2;
        
        // Red offset
        ctx.strokeStyle = `rgba(255, 0, 0, ${alpha})`;
        ctx.beginPath(); ctx.arc(w.x + 2, w.y, w.radius, 0, Math.PI*2); ctx.stroke();
        // Green
        ctx.strokeStyle = `rgba(0, 255, 100, ${alpha})`;
        ctx.beginPath(); ctx.arc(w.x, w.y, w.radius, 0, Math.PI*2); ctx.stroke();
        // Blue offset
        ctx.strokeStyle = `rgba(0, 100, 255, ${alpha})`;
        ctx.beginPath(); ctx.arc(w.x - 2, w.y, w.radius, 0, Math.PI*2); ctx.stroke();
    });

    // 4. Smooth Bezier Ribbon Trail
    if (player.trail.length > 2) {
        ctx.beginPath();
        ctx.moveTo(player.trail[0].x, player.trail[0].y);
        for (let i = 1; i < player.trail.length - 2; i++) {
            const xc = (player.trail[i].x + player.trail[i + 1].x) / 2;
            const yc = (player.trail[i].y + player.trail[i + 1].y) / 2;
            ctx.quadraticCurveTo(player.trail[i].x, player.trail[i].y, xc, yc);
        }
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.disoriented ? "#ff0033" : "#00bbff";
        
        // Gradient trail
        const grad = ctx.createLinearGradient(player.trail[0].x, player.trail[0].y, player.trail[player.trail.length-1].x, player.trail[player.trail.length-1].y);
        if (player.disoriented) {
            grad.addColorStop(0, "rgba(255, 0, 80, 1)"); grad.addColorStop(1, "rgba(255, 0, 80, 0)");
        } else {
            grad.addColorStop(0, "rgba(0, 210, 255, 1)"); grad.addColorStop(1, "rgba(0, 100, 255, 0)");
        }
        
        ctx.strokeStyle = grad;
        ctx.lineWidth = keys.Shift ? 6 : 3;
        ctx.lineCap = "round";
        ctx.stroke();
    }

    // 5. Player Ship Core Glow
    ctx.save();
    ctx.translate(player.x, player.y); ctx.rotate(player.rotation);
    ctx.shadowBlur = 20; ctx.shadowColor = player.disoriented ? "#ff0055" : "#aaccff";
    ctx.fillStyle = player.disoriented ? "#ff3366" : "#ffffff";
    ctx.beginPath();
    ctx.moveTo(12, 0); ctx.lineTo(-10, 8); ctx.lineTo(-6, 0); ctx.lineTo(-10, -8);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    ctx.restore(); // End Camera space

    // 6. Foreground Dust (Screen Space)
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
    dust.forEach(d => {
        ctx.beginPath(); ctx.arc(d.x, d.y, d.size/2, 0, Math.PI*2); ctx.fill();
    });
}

function loop() {
    update(); draw(); requestAnimationFrame(loop);
}

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

startBtn.addEventListener('click', () => {
    startScreen.style.opacity = '0';
    startScreen.style.backdropFilter = 'blur(0px)';
    setTimeout(() => startScreen.style.display = 'none', 1500);
    initAudio(); loop();
});
</script>
</body>
</html>
